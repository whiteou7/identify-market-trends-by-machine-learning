services:

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Mount dataset read-only so the container sees coin_Bitcoin.csv
      # without baking it into the image
      - ./dataset:/app/dataset:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
